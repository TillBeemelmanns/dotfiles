- defaults:
    link:
        relink: true
        create: true
    clean:
        recursive: true

- clean:
    '~':
        recursive: false
    '~/.config':
        recursive: false
    '~/.local/bin':

- shell:
    - command: bash scripts/install-bat.sh
      description: Install bat if not already installed
    - command: bash scripts/install-delta.sh
      description: Install delta if not already installed
    - command: bash scripts/install-lazygit.sh
      description: Install lazygit if not already installed
    - command: bash scripts/install-turm.sh
      description: Install turm if not already installed
    - command: bash scripts/install-yazi.sh
      description: Install yazi if not already installed
    - command: '[ -L ~/.config/ghostty ] && rm ~/.config/ghostty || true'
      description: Remove ghostty directory symlink to allow individual file linking

- link:
    ~/.config/lazygit:
        path: config/lazygit
    ~/.config/pip:
        path: config/pip

    ~/.config/ghostty/themes:
        path: config/ghostty/themes

    ~/.claude/settings.json:
        path: config/claude/settings.json
    ~/.claude/statusline-command.sh:
        path: config/claude/statusline-command.sh

    ~/:
        glob: true
        path: home/*
        prefix: '.'

- link:
    ~/.config/ghostty/config:
        if: '[ `uname` = Darwin ]'
        path: config/ghostty/config_darwin

- link:
    ~/.config/ghostty/config:
        if: '[ `uname` = Linux ]'
        path: config/ghostty/config_linux
