- defaults:
    link:
        relink: true
        create: true

- clean: ['~', '~/.config', '~/.local/bin']

- shell:
    - command: '[ -L ~/.config/ghostty ] && rm ~/.config/ghostty || true'
      description: Remove ghostty directory symlink to allow individual file linking

- link:
    ~/.config/lazygit:
        path: config/lazygit
    ~/.config/pip:
        path: config/pip

    ~/.config/ghostty/themes:
        path: config/ghostty/themes
    ~/.config/ghostty/config:
        if: '[ `uname` = Darwin ]'
        path: config/ghostty/config_darwin
    ~/.config/ghostty/config:
        if: '[ `uname` = Linux ]'
        path: config/ghostty/config_linux

    ~/.claude/settings.json:
        path: config/claude/settings.json
    ~/.claude/statusline-command.sh:
        path: config/claude/statusline-command.sh

    ~/:
        glob: true
        path: home/*
        prefix: '.'
